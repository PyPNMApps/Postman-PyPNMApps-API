<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PyPNM / DOCSIS-3.1 / System-Diplexer</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      background: #f8fafc;
      color: #111827;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .frame {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px;
    }
    .error {
      white-space: pre-wrap;
      color: #fecaca;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      padding: 8px;
      border-radius: 6px;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #0f172a;
        color: #e5e7eb;
      }
      .frame {
        background: #111827;
        border-color: #374151;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
</head>
<body>
  <div id="app" class="frame"></div>
  <script>
  (function() {
    const sampleData = {"mac_address": "aa:bb:cc:dd:ee:ff", "status": 0, "message": null, "results": {"diplexer": {"diplexer_capability": 20, "cfg_band_edge": 204000000, "ds_lower_capability": 3, "cfg_ds_lower_band_edge": 258000000, "ds_upper_capability": 2, "cfg_ds_upper_band_edge": 1794000000}}};
    const visualSource = "// Visualization Script\n// Visualization Script\nvar template = `\n<style>\n    .container {\n        font-family: Arial, sans-serif;\n        padding: 20px;\n        background: #1a1a2e;\n        color: #eee;\n    }\n    .title {\n        text-align: center;\n        font-size: 18px;\n        margin-bottom: 5px;\n        color: #00d4ff;\n    }\n    .subtitle {\n        text-align: center;\n        font-size: 12px;\n        color: #888;\n        margin-bottom: 20px;\n    }\n    .chart-container {\n        background: #0d0d1a;\n        border-radius: 8px;\n        padding: 15px;\n    }\n    .legend {\n        display: flex;\n        justify-content: center;\n        gap: 30px;\n        margin-top: 15px;\n    }\n    .legend-item {\n        display: flex;\n        align-items: center;\n        gap: 8px;\n        font-size: 12px;\n    }\n    .legend-color {\n        width: 30px;\n        height: 4px;\n        border-radius: 2px;\n    }\n    .legend-us { background: #ff6b6b; }\n    .legend-ds { background: #4dabf7; }\n    .stats {\n        display: flex;\n        justify-content: space-around;\n        margin-top: 20px;\n        padding: 15px;\n        background: rgba(255,255,255,0.05);\n        border-radius: 8px;\n    }\n    .stat-box {\n        text-align: center;\n    }\n    .stat-value {\n        font-size: 18px;\n        font-weight: bold;\n        color: #00d4ff;\n    }\n    .stat-label {\n        font-size: 10px;\n        color: #888;\n        margin-top: 3px;\n    }\n</style>\n\n<div class=\"container\">\n    <div class=\"title\">Diplexer Frequency Response (9th Order Butterworth)</div>\n    <div class=\"subtitle\">MAC: {{macAddress}} | Diplexer Capability: {{diplexerCap}}</div>\n    \n    <div class=\"chart-container\">\n        <canvas id=\"diplexerChart\" height=\"90\"></canvas>\n    </div>\n    \n    <div class=\"legend\">\n        <div class=\"legend-item\">\n            <div class=\"legend-color legend-us\"></div>\n            <span>Upstream (Low-Pass) | 5 - {{bandEdge}} MHz</span>\n        </div>\n        <div class=\"legend-item\">\n            <div class=\"legend-color legend-ds\"></div>\n            <span>Downstream (High-Pass) | {{dsLower}} - {{dsUpper}} MHz</span>\n        </div>\n    </div>\n    \n    <div class=\"stats\">\n        <div class=\"stat-box\">\n            <div class=\"stat-value\">{{bandEdge}} MHz</div>\n            <div class=\"stat-label\">US Cutoff (Band Edge)</div>\n        </div>\n        <div class=\"stat-box\">\n            <div class=\"stat-value\">{{dsLower}} MHz</div>\n            <div class=\"stat-label\">DS Lower Band Edge</div>\n        </div>\n        <div class=\"stat-box\">\n            <div class=\"stat-value\">{{dsUpper}} MHz</div>\n            <div class=\"stat-label\">DS Upper Band Edge</div>\n        </div>\n        <div class=\"stat-box\">\n            <div class=\"stat-value\">{{dsLowerCap}} / {{dsUpperCap}}</div>\n            <div class=\"stat-label\">DS Lower/Upper Cap</div>\n        </div>\n    </div>\n</div>\n\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.5.0/Chart.min.js\"><\/script>\n<script>\n    if (typeof Chart !== 'undefined' && Chart.pluginService && !window.__diplexerCutoffPluginRegistered) {\n        Chart.pluginService.register({\n            afterDatasetsDraw: function(chart) {\n                var markers = chart.config && chart.config.options && chart.config.options.cutoffMarkers;\n                if (!Array.isArray(markers) || !markers.length) return;\n\n                var xScale = chart.scales['x-axis-0'];\n                var yScale = chart.scales['y-axis-0'];\n                if (!xScale || !yScale) return;\n\n                var labels = (chart.data && Array.isArray(chart.data.labels)) ? chart.data.labels : [];\n                var ctx = chart.chart.ctx;\n                var area = chart.chartArea;\n                if (!ctx || !area) return;\n\n                function nearestLabelIndex(target) {\n                    var bestIdx = -1;\n                    var bestDiff = Infinity;\n                    for (var i = 0; i < labels.length; i++) {\n                        var n = Number(labels[i]);\n                        if (!isFinite(n)) continue;\n                        var d = Math.abs(n - target);\n                        if (d < bestDiff) {\n                            bestDiff = d;\n                            bestIdx = i;\n                        }\n                    }\n                    return bestIdx;\n                }\n\n                ctx.save();\n                ctx.setLineDash([6, 4]);\n                ctx.lineWidth = 1.5;\n\n                markers.forEach(function(m) {\n                    var freq = Number(m && m.freqMHz);\n                    if (!isFinite(freq)) return;\n                    var idx = nearestLabelIndex(freq);\n                    if (idx < 0) return;\n                    var x = xScale.getPixelForTick(idx);\n                    if (!isFinite(x)) return;\n\n                    ctx.strokeStyle = (m && m.color) || '#ffffff';\n                    ctx.beginPath();\n                    ctx.moveTo(x, area.top);\n                    ctx.lineTo(x, area.bottom);\n                    ctx.stroke();\n                });\n\n                ctx.restore();\n            }\n        });\n        window.__diplexerCutoffPluginRegistered = true;\n    }\n\n    var ctx = document.getElementById(\"diplexerChart\");\n    var diplexerChart = new Chart(ctx, {\n        type: \"line\",\n        data: {\n            labels: [],\n            datasets: [\n                {\n                    label: 'Upstream (Low-Pass)',\n                    data: [],\n                    borderColor: '#ff6b6b',\n                    backgroundColor: 'rgba(255, 107, 107, 0.1)',\n                    borderWidth: 2,\n                    fill: true,\n                    pointRadius: 0,\n                    tension: 0.4\n                },\n                {\n                    label: 'Downstream (High-Pass)',\n                    data: [],\n                    borderColor: '#4dabf7',\n                    backgroundColor: 'rgba(77, 171, 247, 0.1)',\n                    borderWidth: 2,\n                    fill: true,\n                    pointRadius: 0,\n                    tension: 0.4\n                }\n            ]\n        },\n        options: {\n            cutoffMarkers: [],\n            legend: { display: false },\n            title: {\n                display: false\n            },\n            scales: {\n                xAxes: [{\n                    display: true,\n                    scaleLabel: {\n                        display: true,\n                        labelString: 'Frequency (MHz)',\n                        fontColor: '#888'\n                    },\n                    ticks: {\n                        fontColor: '#666',\n                        maxTicksLimit: 15\n                    },\n                    gridLines: {\n                        color: 'rgba(255,255,255,0.1)'\n                    }\n                }],\n                yAxes: [{\n                    display: true,\n                    scaleLabel: {\n                        display: true,\n                        labelString: 'Magnitude (dB)',\n                        fontColor: '#888'\n                    },\n                    ticks: {\n                        fontColor: '#666',\n                        min: -60,\n                        max: 5\n                    },\n                    gridLines: {\n                        color: 'rgba(255,255,255,0.1)'\n                    }\n                }]\n            }\n        }\n    });\n\n    pm.getData(function (err, value) {\n        diplexerChart.data.labels = value.freqLabels;\n        diplexerChart.data.datasets[0].data = value.upstreamData;\n        diplexerChart.data.datasets[1].data = value.downstreamData;\n        diplexerChart.options.cutoffMarkers = [\n            { freqMHz: value.bandEdge, color: '#ff6b6b' },\n            { freqMHz: value.dsLower, color: '#4dabf7' },\n            { freqMHz: value.dsUpper, color: '#4dabf7' }\n        ];\n        diplexerChart.update();\n    });\n<\/script>\n`;\n\nfunction createPayload() {\n    var response = pm.response.json();\n    var diplexer = response.results.diplexer;\n    \n    var bandEdge = diplexer.cfg_band_edge / 1000000;\n    var dsLower = diplexer.cfg_ds_lower_band_edge / 1000000;\n    var dsUpper = diplexer.cfg_ds_upper_band_edge / 1000000;\n    \n    var order = 9;\n    var freqLabels = [];\n    var upstreamData = [];\n    var downstreamData = [];\n    \n    var maxFreq = 1400;\n    var numPoints = 200;\n    \n    for (var i = 0; i <= numPoints; i++) {\n        var freq = (i / numPoints) * maxFreq;\n        freqLabels.push(Math.round(freq));\n        \n        // 9th order Butterworth low-pass response for upstream\n        // H(f) = 1 / sqrt(1 + (f/fc)^(2n))\n        // In dB: -10 * log10(1 + (f/fc)^(2n))\n        var usRatio = freq / bandEdge;\n        var usMag = -10 * Math.log10(1 + Math.pow(usRatio, 2 * order));\n        usMag = Math.max(usMag, -60);\n        upstreamData.push(usMag.toFixed(2));\n        \n        // 9th order Butterworth high-pass response for downstream\n        // H(f) = 1 / sqrt(1 + (fc/f)^(2n))\n        // In dB: -10 * log10(1 + (fc/f)^(2n))\n        var dsRatio = dsLower / freq;\n        var dsMag;\n        if (freq < 1) {\n            dsMag = -60;\n        } else {\n            dsMag = -10 * Math.log10(1 + Math.pow(dsRatio, 2 * order));\n            // Apply upper cutoff as well (bandpass effect)\n            var dsUpperRatio = freq / dsUpper;\n            var dsUpperMag = -10 * Math.log10(1 + Math.pow(dsUpperRatio, 2 * order));\n            dsMag = dsMag + dsUpperMag;\n        }\n        dsMag = Math.max(dsMag, -60);\n        downstreamData.push(dsMag.toFixed(2));\n    }\n    \n    return {\n        macAddress: response.mac_address,\n        bandEdge: bandEdge,\n        dsLower: dsLower,\n        dsUpper: dsUpper,\n        diplexerCap: diplexer.diplexer_capability,\n        dsLowerCap: diplexer.ds_lower_capability,\n        dsUpperCap: diplexer.ds_upper_capability,\n        freqLabels: freqLabels,\n        upstreamData: upstreamData,\n        downstreamData: downstreamData\n    };\n}\n\npm.visualizer.set(template, createPayload());\n";
    const app = document.getElementById("app");
    let visualizerData = sampleData;
    let lastTemplate = null;

    function showError(prefix, err) {
      const msg = String(err && err.stack || err);
      app.innerHTML = '<div class="error">' + prefix + '\n' + msg + '</div>';
    }

    async function executeRenderedScripts(root) {
      const scripts = Array.from(root.querySelectorAll("script"));
      for (const oldScript of scripts) {
        const newScript = document.createElement("script");
        for (const attr of oldScript.attributes) {
          newScript.setAttribute(attr.name, attr.value);
        }
        const parent = oldScript.parentNode;
        if (!parent) continue;

        if (oldScript.src) {
          await new Promise((resolve, reject) => {
            newScript.onload = resolve;
            newScript.onerror = function() {
              reject(new Error('Failed to load script: ' + oldScript.src));
            };
            parent.replaceChild(newScript, oldScript);
          });
          continue;
        }

        newScript.textContent = oldScript.textContent;
        parent.replaceChild(newScript, oldScript);
      }
    }

    function renderTemplate(template, data) {
      lastTemplate = template;
      visualizerData = data == null ? sampleData : data;
      try {
        const looksLikeHandlebars =
          typeof template === "string" &&
          template.indexOf("{") !== -1 &&
          template.indexOf("}") !== -1;
        if (window.Handlebars && looksLikeHandlebars) {
          const compiled = window.Handlebars.compile(template);
          app.innerHTML = compiled(visualizerData);
          void executeRenderedScripts(app).catch((err) => showError('Rendered script execution error', err));
        } else if (typeof template === "string") {
          app.innerHTML = template;
          void executeRenderedScripts(app).catch((err) => showError('Rendered script execution error', err));
        } else {
          app.textContent = String(template);
        }
      } catch (err) {
        showError('Template render error', err);
      }
    }

    function makeKVStore() {
      const store = Object.create(null);
      return {
        get: function(key) { return Object.prototype.hasOwnProperty.call(store, key) ? store[key] : undefined; },
        set: function(key, value) { store[key] = value; return value; },
        unset: function(key) { delete store[key]; }
      };
    }

    window.pm = {
      response: {
        json: function() { return sampleData; },
        text: function() { return JSON.stringify(sampleData); }
      },
      request: {
        body: {
          raw: "{}"
        }
      },
      environment: makeKVStore(),
      globals: makeKVStore(),
      variables: makeKVStore(),
      getData: function(cb) {
        if (typeof cb === "function") cb(null, visualizerData);
      },
      visualizer: {
        set: function(template, data) {
          renderTemplate(template, data);
        }
      }
    };

    window.console = window.console || { log(){}, warn(){}, error(){} };
    window.addEventListener('error', function(ev) {
      if (ev && ev.error) showError('Window error', ev.error);
    });
    window.addEventListener('unhandledrejection', function(ev) {
      showError('Unhandled promise rejection', ev && ev.reason);
    });

    if (sampleData && typeof sampleData === 'object' && sampleData.__error__) {
      app.innerHTML = '<div class="error">Preview unavailable\nInvalid sample JSON fixture\n' + String(sampleData.__error__) + '</div>';
      return;
    }

    try {
      const fn = new Function(visualSource);
      fn();
      if (!lastTemplate && !app.innerHTML.trim()) {
        app.innerHTML = '<div class="error">No visualizer output produced. The script may require unsupported Postman APIs.</div>';
      }
    } catch (err) {
      showError('Script execution error', err);
    }
  })();
  </script>
</body>
</html>
