node.x < left.x) left = node;\n            if (node.x > right.x) right = node;\n          });\n\n          const height = right.x - left.x + dx * 2;\n          const transition = svg.transition().duration(duration)\n            .attr('height', height)\n            .attr('viewBox', [-40, left.x - dx, width, height]);\n\n          const node = gNode.selectAll('g').data(nodes, function (d) { return d.id; });\n\n          const nodeEnter = node.enter().append('g')\n            .attr('transform', function () { return 'translate(' + source.y0 + ',' + source.x0 + ')'; })\n            .attr('fill-opacity', 0)\n            .attr('stroke-opacity', 0)\n            .on('click', function (event, d) {\n              d.children = d.children ? null : d._children;\n              update(d);\n            });\n\n          nodeEnter.append('circle')\n            .attr('r', 5)\n            .attr('fill', function (d) { return d._children ? nodeColor(d.data.kind) : '#1b2332'; })\n            .attr('stroke', function (d) { return nodeColor(d.data.kind); })\n            .attr('stroke-width', 1.5);\n\n          nodeEnter.append('text')\n            .attr('dy', '0.31em')\n            .attr('x', function (d) { return d._children ? -10 : 10; })\n            .attr('text-anchor', function (d) { return d._children ? 'end' : 'start'; })\n            .text(function (d) {\n              const name = d && d.data && d.data.name ? String(d.data.name) : 'N/A';\n              const subtitle = d && d.data && d.data.subtitle ? String(d.data.subtitle) : '';\n              return subtitle ? (name + ' · ' + subtitle) : name;\n            });\n\n          node.merge(nodeEnter).transition(transition)\n            .attr('transform', function (d) { return 'translate(' + d.y + ',' + d.x + ')'; })\n            .attr('fill-opacity', 1)\n            .attr('stroke-opacity', 1);\n\n          node.merge(nodeEnter).select('circle')\n            .attr('fill', function (d) { return d._children ? nodeColor(d.data.kind) : '#1b2332'; })\n            .attr('stroke', function (d) { return nodeColor(d.data.kind); });\n\n          node.exit().transition(transition).remove()\n            .attr('transform', function () { return 'translate(' + source.y + ',' + source.x + ')'; })\n            .attr('fill-opacity', 0)\n            .attr('stroke-opacity', 0);\n\n          const link = gLink.selectAll('path').data(links, function (d) { return d.target.id; });\n\n          const linkEnter = link.enter().append('path')\n            .attr('d', function () {\n              const o = { x: source.x0, y: source.y0 };\n              return diagonal({ source: o, target: o });\n            });\n\n          link.merge(linkEnter).transition(transition).attr('d', diagonal);\n\n          link.exit().transition(transition).remove().attr('d', function () {\n            const o = { x: source.x, y: source.y };\n            return diagonal({ source: o, target: o });\n          });\n\n          root.eachBefore(function (d) {\n            d.x0 = d.x;\n            d.y0 = d.y;\n          });\n        }\n\n        update(root);\n        host.appendChild(svg.node());\n      }\n\n      renderTree(treeData);\n\n      if (summaryRoot && Array.isArray(groups)) {\n        summaryRoot.innerHTML = groups.map(function (g) {\n          return '<tr>' +\n            '<td>' + esc(g.title) + '</td>' +\n            '<td>' + esc(g.direction) + '</td>' +\n            '<td>' + esc(g.count) + '</td>' +\n            '<td>' + esc(g.upCount) + '</td>' +\n            '<td>' + esc(g.downCount) + '</td>' +\n            '<td class=\"mono\">' + esc(g.inOctetsFmt) + '</td>' +\n            '<td class=\"mono\">' + esc(g.outOctetsFmt) + '</td>' +\n            '<td>' + esc(g.maxSpeedFmt) + '</td>' +\n          '</tr>';\n        }).join('');\n      }\n\n      if (groupRoot && Array.isArray(groups)) {\n        groupRoot.innerHTML = groups.map(function (g) {\n          return '<section class=\"card\">' +\n            '<h2 class=\"group-title ' + esc(g.color) + '\">' + esc(g.title) + ' · Interfaces (' + esc(g.count) + ')</h2>' +\n            '<div class=\"tbl-wrap\">' +\n              '<table>' +\n                '<thead><tr><th>ifIndex</th><th>ifName</th><th>ifDescr</th><th>ifType</th><th>Admin</th><th>Oper</th><th>Speed</th><th>In Octets</th><th>Out Octets</th></tr></thead>' +\n                '<tbody>' +\n                  g.rows.map(function (r) {\n                    return '<tr>' +\n                      '<td class=\"mono\">' + esc(r.ifIndex) + '</td>' +\n                      '<td class=\"mono\">' + esc(r.ifName) + '</td>' +\n                      '<td>' + esc(r.ifDescr) + '</td>' +\n                      '<td class=\"mono\">' + esc(r.ifType) + '</td>' +\n                      '<td>' + esc(r.admin) + '</td>' +\n                      '<td>' + esc(r.oper) + '</td>' +\n                      '<td>' + esc(r.speedFmt) + '</td>' +\n                      '<td class=\"mono\">' + esc(r.inOctetsFmt) + '</td>' +\n                      '<td class=\"mono\">' + esc(r.outOctetsFmt) + '</td>' +\n                    '</tr>';\n                  }).join('') +\n                '</tbody>' +\n              '</table>' +\n            '</div>' +\n          '</section>';\n        }).join('');\n      }\n    })();\n  <\/script>\n  `;\n\n  const groupsView = groups.map((g) => ({\n    title: g.title,\n    direction: g.direction,\n    color: g.color,\n    count: g.count,\n    upCount: g.upCount,\n    downCount: g.downCount,\n    inOctetsFmt: fmtInt(g.inOctets),\n    outOctetsFmt: fmtInt(g.outOctets),\n    maxSpeedFmt: fmtBps(g.maxSpeed),\n    rows: g.rows.map((r) => ({\n      ifIndex: r.ifIndex,\n      ifName: r.ifName,\n      ifDescr: r.ifDescr,\n      ifType: r.ifType,\n      admin: r.admin,\n      oper: r.oper,\n      speedFmt: fmtBps(r.speedBps),\n      inOctetsFmt: fmtInt(r.inOctets),\n      outOctetsFmt: fmtInt(r.outOctets)\n    }))\n  }));\n\n  pm.visualizer.set(template, {\n    status: response && response.status !== undefined ? String(response.status) : 'N/A',\n    message: safeText(response && response.message),\n    groupCount: groupsView.length,\n    totalInterfaces: totalInterfaces,\n    totalUp: totalUp,\n    totalDown: totalDown,\n    deviceInfo: deviceInfo,\n    groupsJson: JSON.stringify(groupsView),\n    treeJson: JSON.stringify(treeData)\n  });\n})();\n";
    const app = document.getElementById("app");
    let visualizerData = sampleData;
    let lastTemplate = null;

    function showError(prefix, err) {
      const msg = String(err && err.stack || err);
      app.innerHTML = '<div class="error">' + prefix + '\n' + msg + '</div>';
    }

    async function executeRenderedScripts(root) {
      const scripts = Array.from(root.querySelectorAll("script"));
      for (const oldScript of scripts) {
        const newScript = document.createElement("script");
        for (const attr of oldScript.attributes) {
          newScript.setAttribute(attr.name, attr.value);
        }
        const parent = oldScript.parentNode;
        if (!parent) continue;

        if (oldScript.src) {
          await new Promise((resolve, reject) => {
            newScript.onload = resolve;
            newScript.onerror = function() {
              reject(new Error('Failed to load script: ' + oldScript.src));
            };
            parent.replaceChild(newScript, oldScript);
          });
          continue;
        }

        newScript.textContent = oldScript.textContent;
        parent.replaceChild(newScript, oldScript);
      }
    }

    function renderTemplate(template, data) {
      lastTemplate = template;
      visualizerData = data == null ? sampleData : data;
      try {
        const looksLikeHandlebars =
          typeof template === "string" &&
          template.indexOf("{") !== -1 &&
          template.indexOf("}") !== -1;
        if (window.Handlebars && looksLikeHandlebars) {
          const compiled = window.Handlebars.compile(template);
          app.innerHTML = compiled(visualizerData);
          void executeRenderedScripts(app).catch((err) => showError('Rendered script execution error', err));
        } else if (typeof template === "string") {
          app.innerHTML = template;
          void executeRenderedScripts(app).catch((err) => showError('Rendered script execution error', err));
        } else {
          app.textContent = String(template);
        }
      } catch (err) {
        showError('Template render error', err);
      }
    }

    function makeKVStore() {
      const store = Object.create(null);
      return {
        get: function(key) { return Object.prototype.hasOwnProperty.call(store, key) ? store[key] : undefined; },
        set: function(key, value) { store[key] = value; return value; },
        unset: function(key) { delete store[key]; }
      };
    }

    window.pm = {
      response: {
        json: function() { return sampleData; },
        text: function() { return JSON.stringify(sampleData); }
      },
      request: {
        body: {
          raw: "{}"
        }
      },
      environment: makeKVStore(),
      globals: makeKVStore(),
      variables: makeKVStore(),
      getData: function(cb) {
        if (typeof cb === "function") cb(null, visualizerData);
      },
      visualizer: {
        set: function(template, data) {
          renderTemplate(template, data);
        }
      }
    };

    window.console = window.console || { log(){}, warn(){}, error(){} };
    window.addEventListener('error', function(ev) {
      if (ev && ev.error) showError('Window error', ev.error);
    });
    window.addEventListener('unhandledrejection', function(ev) {
      showError('Unhandled promise rejection', ev && ev.reason);
    });

    if (sampleData && typeof sampleData === 'object' && sampleData.__error__) {
      app.innerHTML = '<div class="error">Preview unavailable\nInvalid sample JSON fixture\n' + String(sampleData.__error__) + '</div>';
      return;
    }

    try {
      const fn = new Function(visualSource);
      fn();
      if (!lastTemplate && !app.innerHTML.trim()) {
        app.innerHTML = '<div class="error">No visualizer output produced. The script may require unsupported Postman APIs.</div>';
      }
    } catch (err) {
      showError('Script execution error', err);
    }
  })();
  </script>
