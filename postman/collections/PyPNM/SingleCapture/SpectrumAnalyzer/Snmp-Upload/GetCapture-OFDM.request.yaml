          border: 1px solid #2a2a2a;
          border-radius: 10px;
        }
      </style>

      <div class="container">
        <div class="header-row">
          <div class="page-title">Spectrum Analysis (OFDM)</div>
          {{#if captureTime}}<div class="capture-time">Capture Time: {{captureTime}}</div>{{/if}}
        </div>

        <div class="device-info">
          <div class="table-wrap">
            <div class="table-title">Device Info</div>
            <table class="table">
              <thead>
                <tr>
                  <th>MacAddress</th>
                  <th>Model</th>
                  <th>Vendor</th>
                  <th>SW Version</th>
                  <th>HW Version</th>
                  <th>Boot ROM</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="mono">{{deviceInfo.macAddress}}</td>
                  <td>{{deviceInfo.MODEL}}</td>
                  <td>{{deviceInfo.VENDOR}}</td>
                  <td class="mono">{{deviceInfo.SW_REV}}</td>
                  <td class="mono">{{deviceInfo.HW_REV}}</td>
                  <td class="mono">{{deviceInfo.BOOTR}}</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="meta-row">
            <div class="meta-pill">Channels: {{channelCount}}</div>
            <div class="meta-pill">Total Captures: {{totalCaptures}}</div>
          </div>
          {{#if channels.length}}
          <div class="channel-nav">
            {{#each channels}}
            <a class="channel-link" href="#channel-{{channelId}}">Channel {{channelId}}</a>
            {{/each}}
          </div>
          {{/if}}
        </div>

        {{#unless channels.length}}
          <div class="empty-state">No analyses found in response.</div>
        {{/unless}}

        {{#if channels.length}}
          <div class="channel-block">
            <div class="channel-title">Combined Spectrum Overlay</div>
            <div class="channel-meta">All channels and captures aligned by frequency</div>
            <div class="chart-container">
              <div class="chart-title">All Channels / Captures (dB)</div>
              <div class="chart-canvas-wrap">
                <canvas id="spectrumChart-combined" class="chart-canvas"></canvas>
              </div>
            </div>
          </div>
        {{/if}}

        {{#each channels}}
          <div class="channel-block" id="channel-{{channelId}}">
            <div class="channel-title">Channel {{channelId}}</div>

            <div class="split-grid">
              <div class="panel">
                <div class="panel-title">Capture Parameters</div>
                <table class="kv-table">
                  <thead><tr><th>Field</th><th>Value</th></tr></thead>
                  <tbody>
                    {{#each captureParamsRows}}
                      <tr><td>{{k}}</td><td>{{v}}</td></tr>
                    {{/each}}
                  </tbody>
                </table>
              </div>

              <div class="panel">
                <div class="panel-title">Channel Summary</div>
                <table class="kv-table">
                  <thead><tr><th>Field</th><th>Value</th></tr></thead>
                  <tbody>
                    <tr><td>Frequency Range (MHz)</td><td>{{channelSummary.freqRangeMHz}}</td></tr>
                    <tr><td>Center Frequency (MHz)</td><td>{{channelSummary.centerMHz}}</td></tr>
                    <tr><td>Bin Bandwidth (MHz)</td><td>{{channelSummary.binBandwidthMHz}}</td></tr>
                    <tr><td>Average Channel Power (dBmV)</td><td>{{channelSummary.avgChannelPower}}</td></tr>
                    <tr><td>Window Average Points</td><td>{{channelSummary.windowAveragePoints}}</td></tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div class="chart-container">
              <div class="chart-title">Spectrum Magnitude by Capture (dB)</div>
              <div class="chart-mode-controls" data-chart-mode="spectrumChart-ch{{channelId}}">
                <label><input type="radio" name="mode-spect-ch{{channelId}}" value="actual" checked> Actual</label>
                <label><input type="radio" name="mode-spect-ch{{channelId}}" value="avg"> Moving Avg</label>
              </div>
              <div class="chart-canvas-wrap">
                <canvas id="spectrumChart-ch{{channelId}}" class="chart-canvas"></canvas>
              </div>
            </div>

            <div class="panel">
              <div class="panel-title">Channel Analysis Details</div>
              <div class="table-container">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Capture</th>
                      <th>Freq Range (MHz)</th>
                      <th>Center (MHz)</th>
                      <th>Avg Power (dB)</th>
                      <th>Min / Max (dB)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {{#each tableRows}}
                      <tr>
                        <td>{{captureLabel}}</td>
                        <td>{{freqRangeMHz}}</td>
                        <td>{{centerMHz}}</td>
                        <td>{{avgPower}}</td>
                        <td>{{minMaxPower}}</td>
                      </tr>
                    {{/each}}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        {{/each}}
      </div>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.5.0/Chart.min.js"></script>
      <script>
      (function () {
        function palette(i) {
          var colors = [
            '#5a6fd8', '#c62828', '#7bc043', '#f1c40f', '#00bcd4',
            '#9b59b6', '#ff9800', '#90a4ae', '#ec407a', '#26a69a'
          ];
          return colors[i % colors.length];
        }

        function setChartMode(chart, mode) {
          if (!chart || !chart.data || !Array.isArray(chart.data.datasets)) return;
          chart.data.datasets.forEach(function (ds) {
            if (!ds || !ds._seriesMode) return;
            ds.hidden = (ds._seriesMode !== mode);
          });
          chart.update(0);
        }

        function bindChartModeControls(canvasId, chart) {
          var group = document.querySelector('.chart-mode-controls[data-chart-mode="' + canvasId + '"]');
          if (!group) return;
          var radios = group.querySelectorAll('input[type="radio"]');
          for (var i = 0; i < radios.length; i++) {
            radios[i].addEventListener('change', function (ev) {
              if (ev && ev.target && ev.target.checked) setChartMode(chart, ev.target.value);
            });
          }
        }

        pm.getData(function (err, value) {
          if (err || !value || !Array.isArray(value.channels)) return;

          var combinedEl = document.getElementById('spectrumChart-combined');
          if (combinedEl) {
            var combinedDatasets = [];
            var dsIdx = 0;
            value.channels.forEach(function (ch) {
              (ch.captures || []).forEach(function (cap) {
                var sig = cap.signal_analysis || {};
                var freqs = Array.isArray(sig.frequencies) ? sig.frequencies : [];
                var mags = Array.isArray(sig.magnitudes) ? sig.magnitudes : [];
                if (!freqs.length || !mags.length) return;
                var c = palette(dsIdx++);
                function points(values) {
                  var n = Math.min(freqs.length, values.length);
                  var out = [];
                  for (var i = 0; i < n; i++) out.push({ x: freqs[i], y: values[i] });
                  return out;
                }
                combinedDatasets.push({
                  label: 'Ch ' + ch.channelId + ' · ' + cap.captureLabel,
                  data: points(mags),
                  borderColor: c,
                  backgroundColor: 'transparent',
                  fill: false,
                  borderWidth: 1.3,
                  pointRadius: 0,
                  lineTension: 0
                });
              });
            });

            var combinedChart = new Chart(combinedEl.getContext('2d'), {
              type: 'line',
              data: { datasets: combinedDatasets },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                legend: {
                  display: true,
                  position: 'top',
                  labels: { fontColor: '#ffffff', fontSize: 10, boxWidth: 10 }
                },
                title: { display: false },
                elements: { point: { radius: 0 }, line: { borderWidth: 1.3 } },
                scales: {
                  xAxes: [{
                    type: 'linear',
                    position: 'bottom',
                    scaleLabel: { display: true, labelString: 'Frequency (MHz)', fontColor: '#ffffff' },
                    ticks: { fontColor: '#ffffff', callback: function (v) { return (Number(v) / 1000000).toFixed(0); } },
                    gridLines: { color: 'rgba(255,255,255,0.08)' }
                  }],
                  yAxes: [{
                    scaleLabel: { display: true, labelString: 'Magnitude (dB)', fontColor: '#ffffff' },
                    ticks: { fontColor: '#ffffff' },
                    gridLines: { color: 'rgba(255,255,255,0.08)' }
                  }]
                },
                tooltips: {
                  mode: 'nearest',
                  intersect: false,
                  callbacks: {
                    label: function (tooltipItem, data) {
                      var dsLabel = (data.datasets[tooltipItem.datasetIndex] && data.datasets[tooltipItem.datasetIndex].label) || '';
                      var freqMHz = (tooltipItem.xLabel / 1000000).toFixed(2);
                      var magDb = Number(tooltipItem.yLabel).toFixed(2);
                      return dsLabel + ': ' + freqMHz + ' MHz, ' + magDb + ' dB';
                    }
                  }
                }
              }
            });
          }

          value.channels.forEach(function (ch) {
            var el = document.getElementById('spectrumChart-ch' + ch.channelId);
            if (!el) return;

            var ctx = el.getContext('2d');
            var datasets = [];

            (ch.captures || []).forEach(function (cap, idx) {
              var sig = cap.signal_analysis || {};
              var freqs = Array.isArray(sig.frequencies) ? sig.frequencies : [];
              var mags = Array.isArray(sig.magnitudes) ? sig.magnitudes : [];
              var avg = (sig.window_average && Array.isArray(sig.window_average.magnitudes)) ? sig.window_average.magnitudes : [];
              if (!freqs.length || (!mags.length && !avg.length)) return;

              var actualColor = ((ch.captures || []).length === 1) ? '#7e57c2' : palette(idx);
              var avgColor = '#c62828';
              function points(values) {
                var n = Math.min(freqs.length, values.length);
                var out = [];
                for (var i = 0; i < n; i++) out.push({ x: freqs[i], y: values[i] });
                return out;
              }
              if (mags.length) datasets.push({
                label: cap.captureLabel + ' · Actual',
                data: points(mags),
                borderColor: actualColor,
                backgroundColor: 'transparent',
                fill: false,
                borderWidth: 1.6,
                pointRadius: 0,
                lineTension: 0,
                _seriesMode: 'actual',
                hidden: false
              });
              if (avg.length) datasets.push({
                label: cap.captureLabel + ' · Moving Avg',
                data: points(avg),
                borderColor: avgColor,
                backgroundColor: 'transparent',
                fill: false,
                borderWidth: 1.6,
                pointRadius: 0,
                lineTension: 0,
                _seriesMode: 'avg',
                hidden: true
              });
            });

            var channelChart = new Chart(ctx, {
              type: 'line',
              data: { datasets: datasets },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                legend: {
                  display: true,
                  position: 'top',
                  labels: { fontColor: '#ffffff', fontSize: 11 }
                },
                title: { display: false },
                elements: {
                  point: { radius: 0 },
                  line: { borderWidth: 1.6 }
                },
                scales: {
                  xAxes: [{
                    type: 'linear',
                    position: 'bottom',
                    scaleLabel: { display: true, labelString: 'Frequency (MHz)', fontColor: '#ffffff' },
                    ticks: {
                      fontColor: '#ffffff',
                      callback: function (v) { return (Number(v) / 1000000).toFixed(0); }
                    },
                    gridLines: { color: 'rgba(255,255,255,0.08)' }
                  }],
                  yAxes: [{
                    scaleLabel: { display: true, labelString: 'Magnitude (dB)', fontColor: '#ffffff' },
                    ticks: { fontColor: '#ffffff' },
                    gridLines: { color: 'rgba(255,255,255,0.08)' }
                  }]
                },
                tooltips: {
                  mode: 'nearest',
                  intersect: false,
                  callbacks: {
                    label: function (tooltipItem, data) {
                      var dsLabel = (data.datasets[tooltipItem.datasetIndex] && data.datasets[tooltipItem.datasetIndex].label) || '';
                      var freqMHz = (tooltipItem.xLabel / 1000000).toFixed(2);
                      var magDb = Number(tooltipItem.yLabel).toFixed(2);
                      return dsLabel + ': ' + freqMHz + ' MHz, ' + magDb + ' dB';
                    }
                  }
                }
              }
            });
            bindChartModeControls('spectrumChart-ch' + ch.channelId, channelChart);
          });
        });
      })();
      </script>
      `;

      function sanitizeMac(value, fallback) {
        var fb = (fallback === undefined || fallback === null) ? 'N/A' : fallback;
        if (value === undefined || value === null) return fb;
        var text = String(value).trim();
        if (!text) return fb;
        var compact = text.replace(/[^0-9a-f]/gi, '').toLowerCase();
        if (compact.length !== 12) return text;
        return compact.match(/.{1,2}/g).join(':');
      }

      function sanitizeSystemDescription(_sys) {
        var sys = (_sys && typeof _sys === 'object') ? _sys : {};
        function present(v) { return v !== undefined && v !== null && String(v).trim() !== ''; }
        return {
          HW_REV: present(sys.HW_REV) ? String(sys.HW_REV).trim() : 'N/A',
          VENDOR: present(sys.VENDOR) ? String(sys.VENDOR).trim() : 'N/A',
          BOOTR: present(sys.BOOTR) ? String(sys.BOOTR).trim() : 'N/A',
          SW_REV: present(sys.SW_REV) ? String(sys.SW_REV).trim() : 'N/A',
          MODEL: present(sys.MODEL) ? String(sys.MODEL).trim() : 'N/A'
        };
      }

      function mergeDeviceInfo(base, incoming) {
        if (!base) return incoming;
        if (!incoming) return base;
        if (base.macAddress === 'N/A' && incoming.macAddress !== 'N/A') base.macAddress = incoming.macAddress;
        ['MODEL', 'VENDOR', 'SW_REV', 'HW_REV', 'BOOTR'].forEach(function (k) {
          if (base[k] === 'N/A' && incoming[k] !== 'N/A') base[k] = incoming[k];
        });
        return base;
      }

      function formatCaptureTime(raw) {
        if (raw === undefined || raw === null || raw === '') return null;
        if (typeof raw === 'number' && isFinite(raw)) {
          var ms = raw > 1e12 ? raw : raw * 1000;
          var d = new Date(ms);
          if (isNaN(d.getTime())) return null;
          return d.toISOString().slice(0, 19).replace('T', ' ') + ' UTC';
        }
        var n = Number(raw);
        if (!isNaN(n) && isFinite(n)) return formatCaptureTime(n);
        var d2 = new Date(raw);
        if (isNaN(d2.getTime())) return String(raw);
        return d2.toISOString().slice(0, 19).replace('T', ' ') + ' UTC';
      }

      function constructVisualizerPayload() {
        var response = pm.response.json();
        var analyses = (response && response.data && Array.isArray(response.data.analyses)) ? response.data.analyses : [];
