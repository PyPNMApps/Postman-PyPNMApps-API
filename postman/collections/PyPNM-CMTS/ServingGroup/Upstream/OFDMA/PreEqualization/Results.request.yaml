              cb.addEventListener('change',()=>{ if(combinedChart&&combinedChart.data&&combinedChart.data.datasets&&combinedChart.data.datasets[i]){ combinedChart.data.datasets[i].hidden=!cb.checked; combinedChart.update('none'); } allCb.checked=rowToggleCheckboxes.every((x)=>x.checked); allCb.indeterminate=!allCb.checked&&rowToggleCheckboxes.some((x)=>x.checked); });
              label.appendChild(cb); label.appendChild(txt); traceGrid.appendChild(label); rowToggleCheckboxes.push(cb);
            });
            allCb.addEventListener('change',()=>{ rowToggleCheckboxes.forEach((cb,i)=>{ cb.checked=allCb.checked; if(combinedChart&&combinedChart.data&&combinedChart.data.datasets&&combinedChart.data.datasets[i]) combinedChart.data.datasets[i].hidden=!allCb.checked; }); allCb.indeterminate=false; if(combinedChart) combinedChart.update('none'); });
            (w.combined_series||[]).forEach((s,i)=>{
              const row=(w.rows||[]).find((r)=>r.chart_id===s.chart_id);
