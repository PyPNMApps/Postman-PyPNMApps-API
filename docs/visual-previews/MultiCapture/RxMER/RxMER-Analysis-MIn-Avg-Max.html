_id !== null) ? obj.channel_id : k;\n    return { ...obj, channel_id: channelId };\n  }).sort((a, b) => {\n    const ai = Number(a.channel_id);\n    const bi = Number(b.channel_id);\n    if (Number.isFinite(ai) && Number.isFinite(bi)) return ai - bi;\n    return String(a.channel_id).localeCompare(String(b.channel_id));\n  });\n\n  let deviceInfo = {\n    macAddress: sanitizeMac(response.mac_address, 'N/A'),\n    MODEL: 'LCPET-3',\n    VENDOR: 'LANCity',\n    SW_REV: '1.0.0',\n    HW_REV: '1.0',\n    BOOTR: 'NONE'\n  };\n  let captureTime = null;\n\n  const rootSys = sanitizeSystemDescription(response.system_description || (((response || {}).data || {}).system_description) || {});\n  if (rootSys) {\n    deviceInfo = mergeDeviceInfo(deviceInfo, {\n      macAddress: sanitizeMac(response.mac_address, 'N/A'),\n      MODEL: rootSys.MODEL,\n      VENDOR: rootSys.VENDOR,\n      SW_REV: rootSys.SW_REV,\n      HW_REV: rootSys.HW_REV,\n      BOOTR: rootSys.BOOTR\n    });\n  }\n\n  channelData.forEach((c) => {\n    const sys = sanitizeSystemDescription((((c || {}).device_details || {}).system_description) || {});\n    if (sys) {\n      deviceInfo = mergeDeviceInfo(deviceInfo, {\n        macAddress: sanitizeMac(c.mac_address || response.mac_address, 'N/A'),\n        MODEL: sys.MODEL,\n        VENDOR: sys.VENDOR,\n        SW_REV: sys.SW_REV,\n        HW_REV: sys.HW_REV,\n        BOOTR: sys.BOOTR\n      });\n    }\n    if (!captureTime) captureTime = formatCaptureTime((((c || {}).pnm_header) || {}).capture_time);\n  });\n\n  const showDeviceInfo = [deviceInfo.MODEL, deviceInfo.VENDOR, deviceInfo.SW_REV, deviceInfo.HW_REV, deviceInfo.BOOTR].some(v => v !== 'N/A');\n\n  return {\n    macAddress: sanitizeMac(response.mac_address, 'N/A'),\n    channelCount: channelData.length,\n    status: response.status === 0 ? 'Success' : 'Error',\n    channelData: channelData,\n    deviceInfo: deviceInfo,\n    showDeviceInfo: showDeviceInfo,\n    captureTime: captureTime\n  };\n}\n\npm.visualizer.set(template, constructVisualizerPayload());\n";
    const app = document.getElementById("app");
    let visualizerData = sampleData;
    let lastTemplate = null;

    async function executeRenderedScripts(root) {
      const scripts = Array.from(root.querySelectorAll("script"));
      for (const oldScript of scripts) {
        const newScript = document.createElement("script");
        for (const attr of oldScript.attributes) {
          newScript.setAttribute(attr.name, attr.value);
        }
        const parent = oldScript.parentNode;
        if (!parent) continue;

        if (oldScript.src) {
          await new Promise((resolve) => {
            newScript.onload = resolve;
            newScript.onerror = resolve;
            parent.replaceChild(newScript, oldScript);
          });
          continue;
        }

        newScript.textContent = oldScript.textContent;
        parent.replaceChild(newScript, oldScript);
      }
    }

    function renderTemplate(template, data) {
      lastTemplate = template;
      visualizerData = data == null ? sampleData : data;
      try {
        if (window.Handlebars && typeof template === "string") {
          const compiled = window.Handlebars.compile(template);
          app.innerHTML = compiled(visualizerData);
          void executeRenderedScripts(app);
        } else if (typeof template === "string") {
          app.innerHTML = template;
          void executeRenderedScripts(app);
        } else {
          app.textContent = String(template);
        }
      } catch (err) {
        app.innerHTML = '<div class="error">Template render error\n' + String(err && err.stack || err) + '</div>';
      }
    }

    function makeKVStore() {
      const store = Object.create(null);
      return {
        get: function(key) { return Object.prototype.hasOwnProperty.call(store, key) ? store[key] : undefined; },
        set: function(key, value) { store[key] = value; return value; },
        unset: function(key) { delete store[key]; }
      };
    }

    window.pm = {
      response: {
        json: function() { return sampleData; },
        text: function() { return JSON.stringify(sampleData); }
      },
      request: {
        body: {
          raw: "{}"
        }
      },
      environment: makeKVStore(),
      globals: makeKVStore(),
      variables: makeKVStore(),
      getData: function(cb) {
        if (typeof cb === "function") cb(null, visualizerData);
      },
      visualizer: {
        set: function(template, data) {
          renderTemplate(template, data);
        }
      }
    };

    window.console = window.console || { log(){}, warn(){}, error(){} };

    try {
      const fn = new Function(visualSource);
      fn();
      if (!lastTemplate && !app.innerHTML.trim()) {
        app.innerHTML = '<div class="error">No visualizer output produced. The script may require unsupported Postman APIs.</div>';
      }
    } catch (err) {
      app.innerHTML = '<div class="error">Script execution error\n' + String(err && err.stack || err) + '</div>';
    }
  })();
  </script>
