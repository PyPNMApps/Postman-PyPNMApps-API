$kind: http-request
url: "{{pypnm_url}}/advance/multi/ds/rxMer/analysis"
method: POST
body:
  type: json
  content: "{\r

    \  \"analysis\": {\r

    \    \"type\": \"{{rxmer_analysis_profile_perf_1}}\",\r

    \    \"output\": {\r

    \      \"type\": \"json\"\r

    \    },\r

    \    \"plot\": {\r

    \      \"ui\": {\r

    \        \"theme\": \"dark\"\r

    \      }\r

    \    }\r

    \  },\r

    \  \"operation_id\": \"{{rxmer_multi_operation_id}}\"\r

    }"
scripts:
  - type: afterResponse
    code: |-
      // Postman Visualizer: MultiCapture/RxMER/Ofdm-RxMER-Analysis-Profile-Performance-1
      // Last Update: 2026-03-02 11:39:00 MST
      // Visual Constraints: Follow canonical visual rules in CODING_AGENTS.md.

      const template = `
      <style>
        body {
          background: #141821;
          color: #e7edf8;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          margin: 0;
          padding: 16px;
        }
        .header-row {
          display: grid;
          grid-template-columns: 1fr auto 1fr;
          align-items: center;
          margin-bottom: 12px;
          gap: 8px;
        }
        .header-row .spacer { min-width: 1px; }
        .page-title {
          grid-column: 2;
          text-align: center;
          font-size: 22px;
          font-weight: 700;
          color: #f3f6ff;
        }
        .capture-time {
          justify-self: end;
          background: #202938;
          border: 1px solid rgba(255,255,255,0.12);
          color: #dbe7ff;
          padding: 6px 10px;
          border-radius: 999px;
          font-size: 12px;
          white-space: nowrap;
        }
        .panel {
          background: #1b2332;
          border: 1px solid rgba(255,255,255,0.09);
          border-radius: 10px;
          box-shadow: 0 8px 20px rgba(0,0,0,0.22);
          padding: 12px;
          margin-bottom: 12px;
        }
        .panel-title {
          text-align: center;
          color: #9ec0ff;
          font-weight: 700;
          margin: 0 0 10px;
          font-size: 16px;
        }
        .device-table {
          width: 100%;
          border-collapse: collapse;
          table-layout: fixed;
          font-size: 12px;
        }
        .device-table th,
        .device-table td {
          border: 1px solid rgba(255,255,255,0.1);
          padding: 8px;
          text-align: left;
          vertical-align: top;
          word-break: break-word;
        }
        .device-table th {
          background: #233048;
          color: #dce8ff;
          font-weight: 600;
        }
        .device-table td {
          background: #182234;
          color: #f3f6ff;
        }
        .device-table .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
        .chart-wrap {
          position: relative;
          height: 320px;
        }
        .chart-wrap canvas {
          width: 100% !important;
          height: 100% !important;
          display: block;
        }
        .channel-grid {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 12px;
        }
        @media (max-width: 980px) {
          .channel-grid {
            grid-template-columns: 1fr;
          }
        }
        .channel-card h3 {
          margin: 0 0 8px;
          text-align: center;
          color: #eef4ff;
          font-size: 16px;
        }
        .profile-table {
          width: 100%;
          border-collapse: collapse;
          margin-top: 10px;
          font-size: 12px;
        }
        .profile-table th,
        .profile-table td {
          border: 1px solid rgba(255,255,255,0.1);
          padding: 6px 8px;
          text-align: left;
        }
        .profile-table th {
          background: #233048;
          color: #dce8ff;
        }
        .profile-table td { background: #182234; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      </style>

      <div class="header-row">
        <div class="spacer"></div>
        <div class="page-title">OFDMA Profile Performance (RxMER)</div>
        {{#if captureTime}}<div class="capture-time">Capture Time: {{captureTime}}</div>{{/if}}
      </div>

      {{#if hasDeviceInfo}}
      <div class="panel">
        <div class="panel-title">Device Info</div>
        <table class="device-table">
          <thead>
            <tr>
              <th>MacAddress</th>
              <th>Model</th>
              <th>Vendor</th>
              <th>SW Version</th>
              <th>HW Version</th>
              <th>Boot ROM</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="mono">{{deviceInfo.macAddress}}</td>
              <td>{{deviceInfo.model}}</td>
              <td>{{deviceInfo.vendor}}</td>
              <td class="mono">{{deviceInfo.swVersion}}</td>
              <td class="mono">{{deviceInfo.hwVersion}}</td>
              <td class="mono">{{deviceInfo.bootRom}}</td>
            </tr>
          </tbody>
        </table>
      </div>
      {{/if}}

      <div class="panel">
        <div class="panel-title">All Channels ({{channelCount}}) · Avg MER Aligned by Frequency</div>
        <div class="chart-wrap"><canvas id="allAvgChart"></canvas></div>
      </div>

      <div id="channelCards" class="channel-grid"></div>

      <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.1/dist/chart.min.js"></script>
      <script>
      (function waitForChart() {
        if (typeof Chart === 'undefined') {
          return setTimeout(waitForChart, 50);
        }
      pm.getData(function (err, value) {
        var channelData = Array.isArray(value.channelData) ? value.channelData : [];
        var root = document.getElementById('channelCards');
        if (!root) return;

        var textColor = '#e7edf8';
        var gridColor = 'rgba(255,255,255,0.08)';
        var tickColor = '#dbe7ff';
        var channelColors = ['#5a6fd8', '#39c28e', '#ff7a7a', '#f4c84b', '#7fd3ff', '#c285ff'];
        var profileColors = ['#c62828', '#6a1b9a', '#2e7d32', '#ef6c00', '#00838f', '#ad1457'];

        function toMHzLabel(hz) {
          var n = Number(hz);
          if (!Number.isFinite(n)) return '';
          return String(Math.round(n / 1000000));
        }

        function uniqSorted(nums) {
          var s = new Set();
          for (var i = 0; i < nums.length; i++) {
            var n = Number(nums[i]);
            if (Number.isFinite(n)) s.add(n);
          }
          return Array.from(s).sort(function (a, b) { return a - b; });
        }

        function buildAlignedSeries(masterFreq, freq, values) {
          var m = new Map();
          var n = Math.min(Array.isArray(freq) ? freq.length : 0, Array.isArray(values) ? values.length : 0);
          for (var i = 0; i < n; i++) {
            var f = Number(freq[i]);
            var v = Number(values[i]);
            if (!Number.isFinite(f)) continue;
            m.set(f, Number.isFinite(v) ? v : null);
          }
          return masterFreq.map(function (f) { return m.has(f) ? m.get(f) : null; });
        }

        function commonLineOptions(yLabel) {
          return {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: textColor, boxWidth: 14 } }
            },
            scales: {
              x: {
                title: { display: true, text: 'Frequency (MHz)', color: tickColor },
                ticks: { color: tickColor, maxTicksLimit: 10 },
                grid: { color: gridColor }
              },
              y: {
                title: { display: true, text: yLabel, color: tickColor },
                ticks: { color: tickColor },
                grid: { color: gridColor }
              }
            }
          };
        }

        var masterFreq = uniqSorted(channelData.flatMap(function (c) {
          return Array.isArray(c.frequency) ? c.frequency : [];
        }));
        var masterLabels = masterFreq.map(toMHzLabel);

        var allDatasets = channelData.map(function (c, idx) {
          return {
            label: 'Channel ' + c.channelId,
            data: buildAlignedSeries(masterFreq, c.frequency, c.avgMer),
            borderColor: channelColors[idx % channelColors.length],
            borderWidth: 1,
            pointRadius: 0,
            tension: 0.1,
            fill: false,
            spanGaps: false
          };
        });

        var allCanvas = document.getElementById('allAvgChart');
        if (allCanvas) {
          new Chart(allCanvas.getContext('2d'), {
            type: 'line',
            data: { labels: masterLabels, datasets: allDatasets },
            options: commonLineOptions('MER (dB)')
          });
        }

        channelData.forEach(function (c, channelIndex) {
          var card = document.createElement('div');
          card.className = 'panel channel-card';

          var title = document.createElement('h3');
          title.textContent = 'Channel ' + c.channelId;
          card.appendChild(title);

          var wrap = document.createElement('div');
          wrap.className = 'chart-wrap';
          var canvas = document.createElement('canvas');
          wrap.appendChild(canvas);
          card.appendChild(wrap);

          var labels = (Array.isArray(c.frequency) ? c.frequency : []).map(toMHzLabel);
          var datasets = [
            {
              label: 'Avg',
              data: Array.isArray(c.avgMer) ? c.avgMer : [],
              borderColor: channelColors[channelIndex % channelColors.length],
              borderWidth: 1,
              pointRadius: 0,
              tension: 0.1,
              fill: false
            }
          ];

          (Array.isArray(c.profiles) ? c.profiles : []).forEach(function (pf, pfIdx) {
            datasets.push({
              label: 'Profile ' + pf.profileId,
              data: Array.isArray(pf.profileMinMer) ? pf.profileMinMer : [],
              borderColor: profileColors[pfIdx % profileColors.length],
              borderWidth: 1,
              pointRadius: 0,
              tension: 0.1,
              fill: false
            });
          });

          new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: { labels: labels, datasets: datasets },
            options: commonLineOptions('MER (dB)')
          });

          if (Array.isArray(c.profileRows) && c.profileRows.length) {
            var table = document.createElement('table');
            table.className = 'profile-table';
            table.innerHTML = '' +
              '<thead><tr>' +
              '<th>Profile</th><th>Capture Time</th><th>Capacity Δ Min</th><th>Capacity Δ Avg</th><th>Capacity Δ Max</th><th>Total CW</th><th>Corrected</th><th>Uncorrectable</th>' +
              '</tr></thead><tbody></tbody>';
            var tbody = table.querySelector('tbody');
            c.profileRows.forEach(function (r) {
              var tr = document.createElement('tr');
              tr.innerHTML = '' +
                '<td>' + r.profileLabel + '</td>' +
                '<td class="mono">' + r.captureTime + '</td>' +
                '<td>' + r.capMin + '</td>' +
                '<td>' + r.capAvg + '</td>' +
                '<td>' + r.capMax + '</td>' +
                '<td class="mono">' + r.totalCodewords + '</td>' +
                '<td class="mono">' + r.corrected + '</td>' +
                '<td class="mono">' + r.uncorrectable + '</td>';
              tbody.appendChild(tr);
            });
            card.appendChild(table);
          }

          root.appendChild(card);
        });
      });
      })();
      </script>
      `;

      function safeText(value, fallback) {
        var fb = fallback == null ? 'N/A' : fallback;
        if (value == null) return fb;
        var s = String(value).trim();
        return s ? s : fb;
      }

      function sanitizeMac(value, fallback) {
        var s = safeText(value, fallback || 'N/A');
        return s === 'N/A' ? s : s.toLowerCase();
      }

      function formatCaptureTime(raw) {
        var n = Number(raw);
        if (!Number.isFinite(n)) return null;
        var d = new Date(n * 1000);
        if (!Number.isFinite(d.getTime())) return null;
        function p(x) { return String(x).padStart(2, '0'); }
        return d.getUTCFullYear() + '-' + p(d.getUTCMonth() + 1) + '-' + p(d.getUTCDate()) + ' ' + p(d.getUTCHours()) + ':' + p(d.getUTCMinutes()) + ':' + p(d.getUTCSeconds()) + ' UTC';
      }

      function numFixed(value, digits) {
        var n = Number(value);
        if (!Number.isFinite(n)) return 'N/A';
        return n.toFixed(digits);
      }

      function summarizeCapacity(values) {
        var arr = (Array.isArray(values) ? values : []).map(Number).filter(Number.isFinite);
        if (!arr.length) return { min: 'N/A', avg: 'N/A', max: 'N/A' };
        var min = Math.min.apply(null, arr);
        var max = Math.max.apply(null, arr);
        var avg = arr.reduce(function (a, b) { return a + b; }, 0) / arr.length;
        return { min: numFixed(min, 2), avg: numFixed(avg, 2), max: numFixed(max, 2) };
      }

      function extractFecSummary(profile) {
        var fec = profile && profile.fec_summary;
        var summaryArr = fec && Array.isArray(fec.summary) ? fec.summary : [];
        var row = summaryArr.find(function (r) { return Number(r && r.profile_id) === Number(profile && profile.profile_id); }) || summaryArr[0] || {};
        var s = (row && row.summary) || {};
        return {
          totalCodewords: Number.isFinite(Number(s.total_codewords)) ? String(Number(s.total_codewords)) : 'N/A',
          corrected: Number.isFinite(Number(s.corrected)) ? String(Number(s.corrected)) : 'N/A',
          uncorrectable: Number.isFinite(Number(s.uncorrectable)) ? String(Number(s.uncorrectable)) : 'N/A'
        };
      }

      function buildDeviceInfo(response) {
        var deviceRoot = (response && response.device && typeof response.device === 'object') ? response.device : response;
        var sys = (deviceRoot && deviceRoot.system_description && typeof deviceRoot.system_description === 'object') ? deviceRoot.system_description : null;
        if (!sys) return null;
        return {
          macAddress: sanitizeMac(deviceRoot && deviceRoot.mac_address, 'N/A'),
          model: safeText(sys.MODEL),
          vendor: safeText(sys.VENDOR),
          swVersion: safeText(sys.SW_REV),
          hwVersion: safeText(sys.HW_REV),
          bootRom: safeText(sys.BOOTR)
        };
      }

      function constructVisualizerPayload() {
        var response = pm.response.json() || {};
        var deviceRoot = (response && response.device && typeof response.device === 'object') ? response.device : response;
        var raw = (response && response.data && typeof response.data === 'object') ? response.data : {};

        var channelData = Object.keys(raw).map(function (k) {
          var obj = raw[k] && typeof raw[k] === 'object' ? raw[k] : {};
          var channelId = (obj.channel_id != null) ? obj.channel_id : k;
          var profiles = (Array.isArray(obj.profiles) ? obj.profiles : []).map(function (p) {
            var cap = summarizeCapacity(p && p.capacity_delta);
            var fec = extractFecSummary(p || {});
            return {
              profileId: (p && p.profile_id != null) ? p.profile_id : 'N/A',
              captureTime: formatCaptureTime(p && p.capture_time) || 'N/A',
              profileMinMer: Array.isArray(p && p.profile_min_mer) ? p.profile_min_mer : [],
              capacityDelta: Array.isArray(p && p.capacity_delta) ? p.capacity_delta : [],
              profileRowsOnly: true,
              capSummary: cap,
              fec: fec,
              profileRow: {
                profileLabel: 'Profile ' + ((p && p.profile_id != null) ? p.profile_id : 'N/A'),
                captureTime: formatCaptureTime(p && p.capture_time) || 'N/A',
                capMin: cap.min,
                capAvg: cap.avg,
                capMax: cap.max,
                totalCodewords: fec.totalCodewords,
                corrected: fec.corrected,
                uncorrectable: fec.uncorrectable
              }
            };
          }).sort(function (a, b) {
            var ai = Number(a.profileId), bi = Number(b.profileId);
            if (Number.isFinite(ai) && Number.isFinite(bi)) return ai - bi;
            return String(a.profileId).localeCompare(String(b.profileId));
          });

          return {
            channelId: channelId,
            frequency: Array.isArray(obj.frequency) ? obj.frequency : [],
            avgMer: Array.isArray(obj.avg_mer) ? obj.avg_mer : [],
            profiles: profiles.map(function (p) {
              return { profileId: p.profileId, captureTime: p.captureTime, profileMinMer: p.profileMinMer, capacityDelta: p.capacityDelta };
            }),
            profileRows: profiles.map(function (p) { return p.profileRow; })
          };
        }).sort(function (a, b) {
          var ai = Number(a.channelId), bi = Number(b.channelId);
          if (Number.isFinite(ai) && Number.isFinite(bi)) return ai - bi;
          return String(a.channelId).localeCompare(String(b.channelId));
        });

        var allProfileIds = [];
        var captureTimes = [];
        channelData.forEach(function (c) {
          (Array.isArray(c.profiles) ? c.profiles : []).forEach(function (p) {
            allProfileIds.push(p.profileId);
            var rawt = p.captureTime;
            if (rawt && rawt !== 'N/A') captureTimes.push(rawt);
          });
        });
        var uniqueProfileIds = Array.from(new Set(allProfileIds.map(String))).sort(function (a, b) {
          var ai = Number(a), bi = Number(b);
          if (Number.isFinite(ai) && Number.isFinite(bi)) return ai - bi;
          return a.localeCompare(b);
        });

        var firstCaptureTime = null;
        for (var i = 0; i < channelData.length && !firstCaptureTime; i++) {
          var profs = channelData[i].profiles || [];
          for (var j = 0; j < profs.length; j++) {
            if (profs[j].captureTime && profs[j].captureTime !== 'N/A') { firstCaptureTime = profs[j].captureTime; break; }
          }
        }

        var deviceInfo = buildDeviceInfo(response);
        return {
          macAddress: sanitizeMac(deviceRoot && deviceRoot.mac_address, 'N/A'),
          status: Number(response.status) === 0 ? 'Success' : 'Error',
          channelCount: channelData.length,
          profileIdsLabel: uniqueProfileIds.length ? uniqueProfileIds.join(', ') : 'N/A',
          captureTime: firstCaptureTime,
          hasDeviceInfo: !!deviceInfo,
          deviceInfo: deviceInfo || {
            macAddress: sanitizeMac(deviceRoot && deviceRoot.mac_address, 'N/A'),
            model: 'N/A', vendor: 'N/A', swVersion: 'N/A', hwVersion: 'N/A', bootRom: 'N/A'
          },
          channelData: channelData
        };
      }

      pm.visualizer.set(template, constructVisualizerPayload());
    language: text/javascript
order: 6000
