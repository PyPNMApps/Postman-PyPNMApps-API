$kind: http-request
url: "{{pypnm_cmts_url}}/cmts/pnm/sg/ds/ofdm/modulationProfile/startCapture"
method: POST
body:
  type: json
  content: "{\r

    \  \"cmts\": {\r

    \    \"serving_group\": {\r

    \      \"id\": [{{sg_ids}}]\r

    \    },\r

    \    \"cable_modem\": {\r

    \      \"mac_address\": [{{mac_addresses}}],\r

    \      \"pnm_parameters\": {\r

    \        \"tftp\": {\r

    \          \"ipv4\": \"{{tftp_server_ipv4}}\",\r

    \          \"ipv6\": \"{{tftp_server_ipv6}}\"\r

    \        },\r

    \        \"capture\": {\r

    \          \"channel_ids\": [{{channel_ids}}]\r

    \        }\r

    \      },\r

    \      \"snmp\": {\r

    \        \"snmpV2C\": {\r

    \          \"community\": \"{{cm_snmp_community_rw}}\"\r

    \        }\r

    \      }\r

    \    }\r

    \  },\r

    \  \"execution\": {\r

    \    \"max_workers\": 16,\r

    \    \"retry_count\": 3,\r

    \    \"retry_delay_seconds\": 5,\r

    \    \"per_modem_timeout_seconds\": 30,\r

    \    \"overall_timeout_seconds\": 120\r

    \  }\r

    }"
scripts:
  - type: afterResponse
    code: >
      // Extract operation.operation_id and save as
      modulation_profile_cmts_operation_id

      let json;

      pm.test('Response is valid JSON', function () {
        pm.response.to.be.json;
        json = pm.response.json();
      });


      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });


      pm.test('Response status is 0', function () {
        const body = json || pm.response.json();
        pm.expect(body).to.have.property('status');
        pm.expect(body.status).to.eql(0);
      });


      pm.test('operation.operation_id exists and is a non-empty string',
      function () {
        const body = json || pm.response.json();
        const opId = body?.operation?.operation_id;

        pm.expect(opId, 'operation.operation_id').to.be.a('string');
        pm.expect(opId.trim().length, 'operation.operation_id non-empty').to.be.greaterThan(0);

        // Prefer collection variable; fallback to environment variable if it throws.
        try {
          pm.collectionVariables.set('modulation_profile_cmts_operation_id', opId);
        } catch (e) {
          pm.environment.set('modulation_profile_cmts_operation_id', opId);
        }
      });
    language: text/javascript
order: 1000
